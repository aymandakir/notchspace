name: Release DMG

on:
  release:
    types: [created]

jobs:
  build-dmg:
    name: Build & attach DMG
    runs-on: macos-14
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        run: |
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_15.4.app/Contents/Developer

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Build (Release, no signing)
        run: |
          xcodebuild \
            -scheme NotchSpace \
            -configuration Release \
            -derivedDataPath .build/DerivedData \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Find .app
        id: app
        run: |
          APP=$(find .build/DerivedData -name "NotchSpace.app" -type d | head -1)
          echo "path=$APP" >> $GITHUB_OUTPUT
          echo "Found app at: $APP"

      - name: Create DMG
        run: |
          mkdir -p dist

          # Create a writable disk image
          hdiutil create \
            -volname "NotchSpace" \
            -srcfolder "${{ steps.app.outputs.path }}" \
            -ov \
            -format UDZO \
            -imagekey zlib-level=9 \
            dist/NotchSpace.dmg

          echo "DMG created:"
          ls -lh dist/NotchSpace.dmg

      - name: Upload DMG to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          mv dist/NotchSpace.dmg "dist/NotchSpace-${VERSION}.dmg"
          gh release upload "$VERSION" \
            "dist/NotchSpace-${VERSION}.dmg" \
            --repo ${{ github.repository }} \
            --clobber
          echo "✓ Uploaded NotchSpace-${VERSION}.dmg"
