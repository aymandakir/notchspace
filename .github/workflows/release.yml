name: Release DMG

on:
  release:
    types: [created]

jobs:
  build-dmg:
    name: Build & attach DMG
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
          xcodebuild -version

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Build (Release, no signing)
        run: |
          xcodebuild \
            -scheme NotchSpace \
            -configuration Release \
            -derivedDataPath .build/DerivedData \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Assemble .app bundle
        run: |
          PROD=".build/DerivedData/Build/Products/Release"
          APP="dist/NotchSpace.app"

          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Frameworks"
          mkdir -p "$APP/Contents/Resources"

          # Executable (SPM builds a plain Unix binary, not a bundle)
          cp "$PROD/NotchSpace" "$APP/Contents/MacOS/NotchSpace"
          chmod +x "$APP/Contents/MacOS/NotchSpace"

          # Sparkle is the only dynamic framework; everything else is statically linked
          cp -R "$PROD/Sparkle.framework" "$APP/Contents/Frameworks/" 2>/dev/null || true

          # Resource bundles (Metal shaders, asset catalog)
          for bundle in "$PROD"/*.bundle; do
            cp -R "$bundle" "$APP/Contents/Resources/" 2>/dev/null || true
          done

          # Info.plist
          cat > "$APP/Contents/Info.plist" << 'PLIST'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
              <key>CFBundleIdentifier</key>       <string>space.notch.NotchSpace</string>
              <key>CFBundleName</key>              <string>NotchSpace</string>
              <key>CFBundleDisplayName</key>       <string>NotchSpace</string>
              <key>CFBundleExecutable</key>        <string>NotchSpace</string>
              <key>CFBundlePackageType</key>       <string>APPL</string>
              <key>CFBundleShortVersionString</key><string>1.0.0</string>
              <key>CFBundleVersion</key>           <string>1</string>
              <key>LSMinimumSystemVersion</key>    <string>14.0</string>
              <key>NSHighResolutionCapable</key>   <true/>
              <key>LSUIElement</key>               <true/>
          </dict>
          </plist>
          PLIST

          echo "Bundle contents:"
          find "$APP" -maxdepth 3

      - name: Create DMG
        run: |
          mkdir -p dist

          hdiutil create \
            -volname "NotchSpace" \
            -srcfolder "dist/NotchSpace.app" \
            -ov \
            -format UDZO \
            -imagekey zlib-level=9 \
            dist/NotchSpace.dmg

          echo "DMG created:"
          ls -lh dist/NotchSpace.dmg

      - name: Upload DMG to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          mv dist/NotchSpace.dmg "dist/NotchSpace-${VERSION}.dmg"
          gh release upload "$VERSION" \
            "dist/NotchSpace-${VERSION}.dmg" \
            --repo ${{ github.repository }} \
            --clobber
          echo "✓ Uploaded NotchSpace-${VERSION}.dmg"
