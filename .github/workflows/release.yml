name: Release DMG

on:
  release:
    types: [created]

jobs:
  build-dmg:
    name: Build & attach DMG
    runs-on: macos-15
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode 16
        run: |
          sudo xcode-select -s /Applications/Xcode_16.4.app/Contents/Developer 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.3.app/Contents/Developer 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.2.app/Contents/Developer 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.1.app/Contents/Developer 2>/dev/null || \
          sudo xcode-select -s /Applications/Xcode_16.app/Contents/Developer
          xcodebuild -version

      - name: Cache SPM
        uses: actions/cache@v4
        with:
          path: .build
          key: ${{ runner.os }}-spm-${{ hashFiles('Package.resolved') }}
          restore-keys: ${{ runner.os }}-spm-

      - name: Build (Release, no signing)
        run: |
          xcodebuild \
            -scheme NotchSpace \
            -configuration Release \
            -derivedDataPath .build/DerivedData \
            -destination 'platform=macOS,arch=arm64' \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Assemble .app bundle
        run: |
          PROD=".build/DerivedData/Build/Products/Release"
          APP="staging/NotchSpace.app"

          mkdir -p "$APP/Contents/MacOS"
          mkdir -p "$APP/Contents/Frameworks"
          mkdir -p "$APP/Contents/Resources"

          # SPM executable target produces a plain binary
          cp "$PROD/NotchSpace" "$APP/Contents/MacOS/NotchSpace"
          chmod +x "$APP/Contents/MacOS/NotchSpace"

          # Sparkle is the only dynamic framework
          cp -R "$PROD/Sparkle.framework" "$APP/Contents/Frameworks/" 2>/dev/null || true

          # Resource bundles (Metal shaders, asset catalog)
          for bundle in "$PROD"/*.bundle; do
            [ -d "$bundle" ] && cp -R "$bundle" "$APP/Contents/Resources/"
          done

          # Minimal Info.plist
          /usr/libexec/PlistBuddy -c "Add :CFBundleIdentifier string space.notch.NotchSpace" \
            -c "Add :CFBundleName string NotchSpace" \
            -c "Add :CFBundleDisplayName string NotchSpace" \
            -c "Add :CFBundleExecutable string NotchSpace" \
            -c "Add :CFBundlePackageType string APPL" \
            -c "Add :CFBundleShortVersionString string 1.0.0" \
            -c "Add :CFBundleVersion string 1" \
            -c "Add :LSMinimumSystemVersion string 14.0" \
            -c "Add :NSHighResolutionCapable bool true" \
            -c "Add :LSUIElement bool true" \
            "$APP/Contents/Info.plist"

          echo "Bundle:"
          find "$APP" -maxdepth 3

      - name: Generate DMG background
        run: swift Scripts/GenerateDMGBackground.swift

      - name: Install create-dmg
        run: brew install create-dmg

      - name: Create DMG
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          mkdir -p dist

          create-dmg \
            --volname "NotchSpace" \
            --background "Scripts/dmg-background.png" \
            --window-pos 200 120 \
            --window-size 660 400 \
            --icon-size 128 \
            --icon "NotchSpace.app" 165 220 \
            --hide-extension "NotchSpace.app" \
            --app-drop-link 495 220 \
            --no-internet-enable \
            "dist/NotchSpace-${VERSION}.dmg" \
            "staging/"

          echo "DMG created:"
          ls -lh "dist/NotchSpace-${VERSION}.dmg"

      - name: Upload DMG to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ github.event.release.tag_name }}"
          gh release upload "$VERSION" \
            "dist/NotchSpace-${VERSION}.dmg" \
            --repo ${{ github.repository }} \
            --clobber
          echo "✓ Uploaded NotchSpace-${VERSION}.dmg"
